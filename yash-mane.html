  body::after{
    content:"";
    position:fixed;
    inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.45));
    z-index:-1;
  }

  .wrap{width:100%;max-width:980px;padding:20px;display:flex;justify-content:center;}
  .card{
    width:var(--card-w);
    border-radius:14px;
    padding:22px;
    background: var(--glass-bg);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 30px rgba(2,6,23,0.6);
    backdrop-filter: blur(8px) saturate(120%);
    color: #fff;
    text-align:center;
  }

  .logo{width:92px;height:auto;margin:0 auto 8px;display:block;filter:brightness(1.2);}
  .company{margin:4px 0 14px;font-size:1.05rem;letter-spacing:0.6px;}
  .name{font-size:1.15rem;font-weight:700;margin:6px 0;}
  .line{margin:8px 0;font-size:0.95rem;}
  .label{display:block;font-size:0.75rem;color:var(--accent);font-weight:700;margin-bottom:4px;}
  .small{font-size:0.9rem;opacity:0.95}
  .meta{margin-top:12px;text-align:left;background:rgba(255,255,255,0.03);padding:10px;border-radius:8px}
  .meta .row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.92rem;align-items:center;}
  .foot{margin-top:14px;font-size:0.8rem;color:rgba(255,255,255,0.8)}
  .qr{width:84px;height:84px;margin:12px auto 0;border-radius:8px;background:#fff;padding:6px}
  .company-link{margin-top:10px;display:block;text-decoration:none;color:#ffd166;font-weight:700;}
  .save-btn{
    display:block;width:100%;background:none;border:none;
    color:#ffd166;font-size:1rem;font-weight:700;cursor:pointer;
    text-align:center;padding:10px 0 2px;
    font-family:Inter,Segoe UI,system-ui,Arial;
    text-decoration:underline;
    text-decoration-color:rgba(255,209,102,0.4);
  }
  .save-btn:hover{color:#ffc83d;}
  .email-link{color:#ffd166;text-decoration:none;font-size:0.85rem;word-break:break-all;}
  .email-link:hover{text-decoration:underline;}
  .toast{
    position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%) translateY(10px);
    background:#111;color:#fff;padding:10px 22px;
    border-radius:8px;font-size:13px;opacity:0;
    pointer-events:none;transition:all 0.3s;z-index:999;
    border:1px solid rgba(255,209,102,0.3);white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (max-width:420px){ .card{width:90%;padding:16px} }
</style>
</head>
